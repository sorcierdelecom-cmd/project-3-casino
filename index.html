<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

<title>Online Casino and Live Casino</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: Arial, sans-serif;
min-height: 100vh;
background-image: url('images/bg.jpg');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;
overflow-x: hidden;
position: relative;
}

/* Desktop background */
@media screen and (min-width: 768px) {
body {
background-image: url('images/bg.jpg');
}
}

.main {
min-height: 100vh;
position: relative;
z-index: 2;
}

/* Header */
.header {
position: relative;
z-index: 10;
padding: 20px;
text-align: center;
}

.header__logo {
display: inline-block;
text-decoration: none;
}

.header__logo-img {
max-width: 200px;
width: 100%;
height: auto;
display: block;
}

.header__logo-text {
font-size: 32px;
font-weight: bold;
color: #ffd700;
text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
letter-spacing: 2px;
display: none;
}

/* Decorative Items */
.decor-items {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
z-index: 1;
overflow: hidden;
}

.decor-items__container {
position: relative;
width: 100%;
height: 100%;
}

.decor-items__item {
position: absolute;
pointer-events: none;
}

.decor-items__item img {
max-width: 100%;
height: auto;
}

/* Position decorative characters */
.decor-items__item--god {
left: 0%;
bottom: 5%;
width: 600px;
max-width: 50%;
z-index: 2;
}

.decor-items__item--girl {
right: 0%;
bottom: 5%;
width: 500px;
max-width: 45%;
z-index: 2;
}

.decor-items__item--1,
.decor-items__item--2,
.decor-items__item--3 {
width: 100px;
opacity: 0.8;
}

.decor-items__item--1 {
top: 20%;
left: 10%;
}

.decor-items__item--2 {
top: 30%;
right: 15%;
}

.decor-items__item--3 {
bottom: 30%;
left: 15%;
}

/* Falling Coins Animation */
.falling-items {
position: absolute;
width: 100%;
height: 100%;
overflow: hidden;
}

.falling-items__item {
position: absolute;
animation: fall linear infinite;
opacity: 0.8;
}

.falling-items__item img {
width: 40px;
height: auto;
}

.falling-items__item--1 { left: 10%; animation-duration: 3s; animation-delay: 0s; }
.falling-items__item--2 { left: 20%; animation-duration: 4s; animation-delay: 0.5s; }
.falling-items__item--3 { left: 30%; animation-duration: 3.5s; animation-delay: 1s; }
.falling-items__item--4 { left: 40%; animation-duration: 4.5s; animation-delay: 1.5s; }
.falling-items__item--5 { left: 50%; animation-duration: 3s; animation-delay: 2s; }
.falling-items__item--6 { left: 60%; animation-duration: 4s; animation-delay: 0.3s; }
.falling-items__item--7 { left: 70%; animation-duration: 3.5s; animation-delay: 0.8s; }
.falling-items__item--8 { left: 80%; animation-duration: 4.5s; animation-delay: 1.2s; }
.falling-items__item--9 { left: 90%; animation-duration: 3s; animation-delay: 1.8s; }

@keyframes fall {
0% {
transform: translateY(-100px) rotate(0deg);
opacity: 0;
}
10% {
opacity: 0.8;
}
90% {
opacity: 0.8;
}
100% {
transform: translateY(100vh) rotate(360deg);
opacity: 0;
}
}

/* Ribbons */
.ribbons {
position: relative;
z-index: 5;
text-align: center;
margin: 10px 0 0 0;
display: flex;
flex-direction: column;
align-items: center;
gap: 8px;
}

.ribbons span {
padding: 10px 30px;
border-radius: 0;
font-weight: bold;
font-size: 16px;
text-transform: uppercase;
letter-spacing: 2px;
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
position: relative;
display: inline-block;
min-width: 200px;
text-align: center;
}

.ribbons span:first-child {
background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
color: #fff;
text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
}

.ribbons span:last-child {
background: linear-gradient(135deg, #00ffff 0%, #00cccc 100%);
color: #000;
text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
}

/* Wheel Section */
.wheel {
position: relative;
z-index: 5;
display: flex;
flex-direction: column;
align-items: center;
padding: 20px;
margin-bottom: 100px;
}

.wheel__attempts {
position: relative;
z-index: 5;
margin-top: 0;
margin-bottom: 15px;
font-size: 14px;
color: #fff;
text-align: center;
font-weight: bold;
text-transform: uppercase;
letter-spacing: 1px;
}

.wheel__attempts-title {
color: #fff;
}

.wheel__attempts-value {
color: #ffd700;
font-size: 18px;
font-weight: bold;
}

.wheel__layout {
position: relative;
width: 550px;
height: 550px;
max-width: 90vw;
max-height: 90vw;
}

.wheel__spinner {
position: relative;
width: 100%;
height: 100%;
}

.wheel__spinner-around {
position: absolute;
width: 100%;
height: 100%;
background-image: url('images/wheel-around.png');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
z-index: 1;
}

.wheel__spinner-img {
position: absolute;
width: 100%;
height: 100%;
background-image: url('images/wheel.png');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
border-radius: 50%;
z-index: 2;
animation: wheelIdle 3s ease-in-out infinite;
filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
}

@keyframes wheelIdle {
0%, 100% {
transform: rotate(-5deg);
}
50% {
transform: rotate(5deg);
}
}

.wheel__spinner--animate .wheel__spinner-img {
animation: none;
transition: transform 6s cubic-bezier(0.23, 1, 0.32, 1);
}

.wheel__spinner--animate.wheel__spinner--win .wheel__spinner-img {
transition: transform 7s cubic-bezier(0.17, 0.67, 0.12, 0.99);
}

.wheel__spinner-arrow {
position: absolute;
top: -5px;
left: 50%;
transform: translateX(-50%);
width: 100px;
height: 100px;
background-image: url('images/arrow.png');
background-size: contain;
background-position: center;
background-repeat: no-repeat;
z-index: 10;
filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
pointer-events: none;
}

.wheel__spinner-center {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 160px;
height: 160px;
border-radius: 50%;
background: #ff0000;
border: none;
z-index: 5;
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 4px 20px rgba(255, 0, 0, 0.5);
cursor: pointer;
transition: all 0.3s ease;
background-image: url('images/btn-spin.png');
background-size: contain;
background-position: center;
background-repeat: no-repeat;
}

.wheel__spinner-center:hover {
transform: translate(-50%, -50%) scale(1.05);
box-shadow: 0 6px 25px rgba(255, 0, 0, 0.7);
}

.wheel__spinner-center:disabled {
cursor: not-allowed;
opacity: 0.7;
}

.wheel__spinner-bling {
position: absolute;
width: 100%;
height: 100%;
/* wheel-bling.png not provided */
background-size: cover;
background-position: center;
background-repeat: no-repeat;
z-index: 3;
pointer-events: none;
animation: sparkle 2s ease-in-out infinite;
}

@keyframes sparkle {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.8; transform: scale(1.02); }
}

/* Achievements */
.wheel__achievements {
position: relative;
z-index: 5;
text-align: center;
margin: 20px 0;
}

.wheel__achievements-fs {
display: none;
}

.wheel__achievements-fs.show {

}

.lights-content {

align-items: center;

.lights-content__gift {

height: auto;

.lights-content__value--subtitle {

/* Failure Modal */

.modal-failure__inner {

</style>
</head>

<script>
// Wheel configuration - same as previous page
const wheelSegments = [
{ text: '75 FREE SPINS', value: 75, angle: 0 },
{ text: '💣', value: 0, angle: 45 },
{ text: '50 FREE SPINS', value: 50, angle: 90 },
{ text: '💣', value: 0, angle: 135 },
{ text: '25 FREE SPINS', value: 25, angle: 180 },
{ text: '💣', value: 0, angle: 225 },
{ text: '150 FREE SPINS', value: 150, angle: 270 },
{ text: '💣', value: 0, angle: 315 }
];

let isSpinning = false;
let currentRotation = 0;
let spinCount = 0;
let wheelOffset = 0;
let remainingAttempts = 2;

// Update attempts counter
function updateAttempts() {
document.getElementById('counter_spin').textContent = remainingAttempts;
}

// Spin the wheel
function spinWheel() {
if (isSpinning || remainingAttempts <= 0) return;

isSpinning = true;
spinCount++;
remainingAttempts--;
updateAttempts();

const spinButton = document.getElementById('spinButton');
spinButton.style.pointerEvents = 'none';
spinButton.style.opacity = '0.7';

const wheel = document.getElementById('wheel');
const spinner = wheel.parentElement;

let selectedSegment;
let segmentIndex;

if (spinCount === 1) {
// First spin always fails - select "PLEASE TRY AGAIN" segment to the left of 150 FREE SPINS
// Index 5 is at angle 225°, which is to the left of index 6 (150 FREE SPINS at 270°)
segmentIndex = 5;
selectedSegment = wheelSegments[segmentIndex];
} else {
// Second spin always wins 150 free spins
segmentIndex = 6;
selectedSegment = wheelSegments[segmentIndex];
}

// Calculate rotation
const fullSpins = spinCount === 1 ? 6 : 12;
const segmentAngle = wheelSegments[segmentIndex].angle;
const baseRotation = (360 - segmentAngle) % 360;
const targetAngle = baseRotation + (360 * fullSpins) + wheelOffset;
const finalRotation = targetAngle;

// Stop idle animation and reset
wheel.style.animation = 'none';
wheel.style.transform = 'rotate(0deg)';

// Add animation class
spinner.classList.add('wheel__spinner--animate');

// Add win class for second spin to use longer animation
if (spinCount === 2) {
spinner.classList.add('wheel__spinner--win');
}

setTimeout(() => {
wheel.style.transform = `rotate(${finalRotation}deg)`;
currentRotation = finalRotation % 360;

const animationDuration = spinCount === 2 ? 7000 : 6000;
setTimeout(() => {
spinner.classList.remove('wheel__spinner--animate');
spinner.classList.remove('wheel__spinner--win');
wheel.style.animation = '';

if (spinCount === 1) {
// First spin - show failure popup
document.getElementById('modalFailure').classList.add('active');
isSpinning = false;
} else {
// Second spin - show success modal
document.getElementById('achievements').classList.remove('hide');
document.getElementById('modal').classList.add('active');
isSpinning = false;
}
}, animationDuration);
}, 50);
}

// Event listeners
document.getElementById('spinButton').addEventListener('click', spinWheel);

// Spin again button (from failure modal)
document.getElementById('spinAgainButton').addEventListener('click', () => {
// Close failure modal
document.getElementById('modalFailure').classList.remove('active');
// Auto spin again
spinWheel();
});

// Claim button
document.getElementById('claimButton').addEventListener('click', (e) => {
e.preventDefault();

window.location.href = 'https://stake.com/?c=rPFh1hSP'; return;
const currentUrl = new URL(window.location.href);
const params = currentUrl.searchParams;

let finalUrl = baseUrl;
if (params.toString()) {
const separator = baseUrl.includes('?') ? '&' : '?';
finalUrl = baseUrl + separator + params.toString();
}

window.location.href = finalUrl;
});

// Initialize
updateAttempts();
</script>
